displayName: cymbal_retail_agent
description: Retail assistant that helps users with their existing purchases and recommendations
  for new products based on their needs.
instruction: agents/cymbal_retail_agent/instruction.txt
tools:
- greeting
- affirmative
- request_image_upload
- ask_to_modify_cart
- end_session
- lookup_plant_details
- get_product_recommendations
- update_cart
childAgents:
- cymbal_upsell_agent
- out_of_scope_handling
beforeModelCallbacks:
- pythonCode: agents/cymbal_retail_agent/before_model_callbacks/before_model_callbacks_01/python_code.py
  description: Inspect user input for any malicious content not covered by built-in
    Guardrails. This is a manual implementation of a guardrail to show how callbacks
    can be used to perform this task.
afterModelCallbacks:
- pythonCode: agents/cymbal_retail_agent/after_model_callbacks/after_model_callbacks_01/python_code.py
  description: Ensure proper tool calling for certain scenarios.
afterToolCallbacks:
- pythonCode: agents/cymbal_retail_agent/after_tool_callbacks/after_tool_callbacks_01/python_code.py
  description: Sets the flag for image upload tool after it has been properly used.
toolsets:
- toolset: crm_service
  toolIds:
  - get_cart_information
  - get_product_recommendations
