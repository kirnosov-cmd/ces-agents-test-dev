name: "Deploy Info gatherer"

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.yaml'
      - '**/*.json'

env:
  PROJECT_ID: "YOUR_PROJECT_ID"
  LOCATION: "YOUR_LOCATION"
  APP_ID: "projects/YOUR_PROJECT_ID/locations/YOUR_LOCATION/apps/YOUR_APP_ID"
  DISPLAY_NAME: "Info gatherer"
  GCP_WORKLOAD_IDENTITY_PROVIDER: "projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider"
  GCP_SERVICE_ACCOUNT: "my-service-account@my-project.iam.gserviceaccount.com" 

jobs:
  deploy-info_gatherer:
    runs-on: ubuntu-latest
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Authenticate to Google Cloud via Workload Identity Federation
      # See https://github.com/google-github-actions/auth for configuration instructions
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install cxas-scrapi CLI
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/GoogleCloudPlatform/cxas-scrapi.git

      - name: Deploy to CX Agent Studio
        run: |
          cxas-eval deploy --agent_dir . \
                           --project_id ${{ env.PROJECT_ID }} \
                           --location ${{ env.LOCATION }} \
                           --app_id ${{ env.APP_ID }} \
                           --display_name "${{ env.DISPLAY_NAME }}"
