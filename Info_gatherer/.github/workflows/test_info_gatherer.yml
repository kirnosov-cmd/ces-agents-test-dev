name: "CI Test Info_gatherer"

on:
  push:
    paths:
      - 'Info_gatherer/**/*.yaml'
      - 'Info_gatherer/**/*.json'
      - '.github/workflows/test_info_gatherer.yml'
  pull_request:
    paths:
      - 'Info_gatherer/**/*.yaml'
      - 'Info_gatherer/**/*.json'
      - '.github/workflows/test_info_gatherer.yml'

env:
  PROJECT_ID: "cloud-es-kalyan"
  LOCATION: "global"
  CXAS_OAUTH_TOKEN: "ya29.a0ATkoCc6rGqz9w3ADRbBaKL4wSiJ_U7qFmS3o_mqPILYKa6YoDEnq2MHZCeuVO6cAX7VY638qZz3dDV5rLd17apw3YHDXggw2ZDdY9_CmX4hbuWM5FlpT3Q_OWUM-3MUbSTBmpo7mQgS92pdhFB4j7sCtS_P13DD1IHn6R8Hcnm1FDpjQS_3Lqf8H1pCbVIdAN0_GeVQ9ugAfbPQaCgYKAdMSARISFQHGX2MizOp2x8BTcLx40Y9Hl-Xhqw0214"

jobs:
  test-info_gatherer:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authentication is handled via the CXAS_OAUTH_TOKEN environment variable defined above.
      # No separate auth step is necessary.




      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: agent-image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run CI Test Lifecycle (Docker)
        run: |
          docker run --rm \
            -v ${ github.workspace }:/workspace \
            -w /workspace \
            -e PROJECT_ID=${{ env.PROJECT_ID }} \
            -e LOCATION=${{ env.LOCATION }} \
            -e CXAS_OAUTH_TOKEN=${{{{ env.CXAS_OAUTH_TOKEN }}}} \
            agent-image \
            ci-test --agent_dir /usr/local/google/home/sethus/git_repos/test_agents/ces-agents-test-dev/Info_gatherer \
                      --project_id ${{ env.PROJECT_ID }} \
                      --location ${{ env.LOCATION }} \
                      --display_name "[CI] PR-${{ github.event.pull_request.number }} Info_gatherer"

