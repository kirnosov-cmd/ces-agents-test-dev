name: "Cleanup Sample app retail (gcs test)"

on:
  pull_request:
    types: [closed]
    paths:
      - 'sample_app_20251023_203910/**/*.yaml'
      - 'sample_app_20251023_203910/**/*.json'

env:
  PROJECT_ID: "wire-box"
  LOCATION: "global"
  GCP_WORKLOAD_IDENTITY_PROVIDER: "projects/1023312446694/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
  GCP_SERVICE_ACCOUNT: "github-actions-sa@wire-box.iam.gserviceaccount.com" 

jobs:
  cleanup-sample_app_retail_gcs_test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event.pull_request.closed == true

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Authenticate to Google Cloud via Workload Identity Federation
      # See https://github.com/google-github-actions/auth for configuration instructions
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Install cxas-scrapi CLI
        run: |
          python -m pip install --upgrade pip
          wget https://storage.googleapis.com/gassets-api-ai/ces-client-libraries/v1beta/ces-v1beta-py.tar
          pip install ces-v1beta-py.tar --quiet
          gsutil cp gs://wire-box-cxas-scrapi/cxas_scrapi-0.1.3-py3-none-any.whl .
          pip install cxas_scrapi-0.1.3-py3-none-any.whl

      - name: Run Cleanup
        run: |
          cxas-eval delete --display_name "[CI] PR-${{ github.event.pull_request.number }} Sample app retail (gcs test)" \
                   --project_id ${{ env.PROJECT_ID }} \
                   --location ${{ env.LOCATION }}
