name: "CI Test Information gatherer"

on:
  pull_request:
    paths:
      - 'Info_gatherer/**/*.yaml'
      - 'Info_gatherer/**/*.json'

env:
  PROJECT_ID: "YOUR_PROJECT_ID"
  LOCATION: "YOUR_LOCATION"
  GCP_WORKLOAD_IDENTITY_PROVIDER: "projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider"
  GCP_SERVICE_ACCOUNT: "my-service-account@my-project.iam.gserviceaccount.com" 

jobs:
  test-information_gatherer:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation
      # See https://github.com/google-github-actions/auth for configuration instructions
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t local-agent-image:information_gatherer Info_gatherer

      - name: Run CI Test Lifecycle (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e PROJECT_ID=${{ env.PROJECT_ID }} \
            -e LOCATION=${{ env.LOCATION }} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/workspace/application_default_credentials.json \
            -v ${{ steps.auth.outputs.credentials_file_path }}:/workspace/application_default_credentials.json \
            local-agent-image:information_gatherer \
            ci-test --agent_dir Info_gatherer \
                      --project_id ${{ env.PROJECT_ID }} \
                      --location ${{ env.LOCATION }} \
                      --display_name "[CI] PR-${{ github.event.pull_request.number }} Information gatherer"

