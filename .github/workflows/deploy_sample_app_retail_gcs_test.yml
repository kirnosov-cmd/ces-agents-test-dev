name: "Deploy Sample_app_retail_gcs_test"

on:
  push:
    branches:
      - main
    paths:
      - '**/*.yaml'
      - '**/*.json'

env:
  PROJECT_ID: "wire-box"
  LOCATION: "us"
  APP_ID: "projects/wire-box/locations/us/apps/sample_app_20251023_203910"
  DISPLAY_NAME: "Sample_app_retail_gcs_test"
  GCP_WORKLOAD_IDENTITY_PROVIDER: "projects/1023312446694/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
  GCP_SERVICE_ACCOUNT: "github-actions-sa@wire-box.iam.gserviceaccount.com" 

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test-sample_app_retail_gcs_test:
    uses: ./.github/workflows/ci_test_sample_app_retail_gcs_test.yml
    secrets: inherit

  deploy-sample_app_retail_gcs_test:
    needs: test-sample_app_retail_gcs_test
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Authenticate to Google Cloud via Workload Identity Federation
      # See https://github.com/google-github-actions/auth for configuration instructions
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Install cxas-scrapi CLI
        run: |
          python -m pip install --upgrade pip
          wget https://storage.googleapis.com/gassets-api-ai/ces-client-libraries/v1beta/ces-v1beta-py.tar
          pip install ces-v1beta-py.tar --quiet
          gsutil cp gs://cxas-scrapi-github/cxas_scrapi-0.1.3-py3-none-any.whl .
          pip install cxas_scrapi-0.1.3-py3-none-any.whl

      - name: Deploy to CX Agent Studio
        run: |
          cxas-eval push --agent_dir . \
                         --project_id ${{ env.PROJECT_ID }} \
                         --location ${{ env.LOCATION }} \
                         --app_id ${{ env.APP_ID }} \
                         --display_name "${{ env.DISPLAY_NAME }}"
