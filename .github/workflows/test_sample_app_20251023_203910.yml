name: "CI Test Sample_app_20251023_203910"

on:
  push:
    branches:
      - trigger-ci-test

env:
  PROJECT_ID: "wire-box"
  LOCATION: "global"
  # Store your OAuth Token string in GitHub Secrets
  CXAS_OAUTH_TOKEN: ${{ secrets.CXAS_OAUTH_TOKEN }}

jobs:
  test-sample_app_20251023_203910:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Authentication is handled via the CXAS_OAUTH_TOKEN environment variable defined above.
      # No separate auth step is necessary.




      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: sample_app_20251023_203910
          load: true
          tags: agent-image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run CI Test Lifecycle (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e PROJECT_ID=${{ env.PROJECT_ID }} \
            -e LOCATION=${{ env.LOCATION }} \
            -e CXAS_OAUTH_TOKEN=${{ env.CXAS_OAUTH_TOKEN }} \
            agent-image \
            ci-test --agent_dir sample_app_20251023_203910 \
                      --project_id ${{ env.PROJECT_ID }} \
                      --location ${{ env.LOCATION }} \
                      --display_name "[CI] PR-${{ github.event.pull_request.number }} Sample_app_20251023_203910"

